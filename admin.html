<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FECAF FLIX</title>

    <!-- CSS -->
    <link rel="stylesheet" href="public/css/admin.css">

    <!-- JS -->
    <script src="./public/js/admin.js" defer></script>
</head>

<body>

    <!-- SIDEBAR LATERAL -->
    <aside class="sidebar">
        <h2>FECAF FLIX</h2>

        <nav>
            <button class="menu-btn" data-modal="modalAddVideo">➕ Adicionar Vídeo</button>
            <button class="menu-btn" data-modal="modalUsers">👥 Lista de Usuários</button>
            <button class="menu-btn" data-modal="modalAddAdmin">⭐ Criar Admin</button>
            <button class="menu-btn" data-modal="modalFilmes">🎬 Lista de Filmes</button>
            <button class="menu-btn" data-modal="modalGenero">🏷 Adicionar Gênero</button>
        </nav>

        <button id="logoutBtn" class="logout">Sair</button>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="content">
        <h1>Painel Administrativo</h1>
        <p>Selecione uma opção no menu ao lado.</p>

        <!-- Mensagens globais -->
        <p id="mensagem" class="mensagem"></p>
    </main>

    <!-- MODAL: Adicionar Vídeo -->
    <div class="modal" id="modalAddVideo">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Cadastrar Novo Vídeo</h2>

            <form id="formVideo" enctype="multipart/form-data">

                <div class="input-group">
                    <label for="nome_filme">Nome do Filme</label>
                    <input type="text" id="nome_filme" required>
                </div>

                <div class="input-group">
                    <label for="sinopse">Sinopse</label>
                    <textarea id="sinopse" rows="4" required></textarea>
                </div>

                <div class="input-group">
                    <label for="genero">Gênero</label>
                    <select id="genero" required></select>
                </div>

                <div class="input-group">
                    <label for="capa">Capa do Filme</label>
                    <input type="file" id="capa" accept="image/*" required>
                    <img id="previewCapa" class="preview" style="display:none;">
                </div>

                <div class="input-group">
                    <label for="video">Arquivo de Vídeo</label>
                    <input type="file" id="video" accept="video/mp4" required>
                    <video id="previewVideo" class="preview" controls style="display:none;"></video>
                </div>

                <button type="submit" class="btn">Cadastrar Vídeo</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Lista de Usuários -->
    <div class="modal" id="modalUsers">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Lista de Usuários</h2>
            <div id="listaUsuarios"></div>
        </div>
    </div>

    <!-- MODAL: Criar Admin -->
    <div class="modal" id="modalAddAdmin">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Criar Novo Admin</h2>
            <form id="formAdmin">
                <input type="text" id="adminNome" placeholder="Nome" required>
                <input type="email" id="adminEmail" placeholder="Email" required>
                <input type="password" id="adminSenha" placeholder="Senha" required>
                <button type="submit">Criar Admin</button>
            </form>
        </div>
    </div>

    <!-- MODAL: Lista de Filmes -->
    <div class="modal" id="modalFilmes">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Lista de Filmes</h2>
            <div id="listaFilmes"></div>
        </div>
    </div>

    <!-- MODAL: Adicionar Gênero -->
    <div class="modal" id="modalGenero">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Adicionar Gênero</h2>
            <form id="formGenero">
                <input type="text" id="nomeGenero" placeholder="Nome do gênero" required>
                <button type="submit">Adicionar</button>
            </form>
        </div>
    </div>

</body>
</html>
