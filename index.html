<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - UniFECAF FLIX</title>
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e50914;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #b20710;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="logar()">Entrar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function logar() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const msg = document.getElementById("msg");

      msg.innerHTML = "Validando...";

      try {
        const response = await fetch("http://localhost:8080/v1/fecaf-flix/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok) {
          msg.innerHTML = `<span style="color:red">${data.erro}</span>`;
          return;
        }

        // Salva o token no navegador
        localStorage.setItem("token", data.token);

        msg.innerHTML = `<span style="color:lightgreen">Login realizado!</span>`;

        // Redirecionar para outra página
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000);

      } catch (error) {
        msg.innerHTML = `<span style="color:red">Erro ao conectar com a API</span>`;
      }
    }
  </script>

</body>
</html>
