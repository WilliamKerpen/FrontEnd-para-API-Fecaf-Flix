<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fecaf Flix - Login</title>
  <link rel="stylesheet" href="public/css/loginAdm.css">
  <script src="public/js/login.js" defer></script>
</head>
<body>
  <main class="login-container">
    <h1>Bem-vindo ao Fecaf Flix</h1>

    <form id="form-login">
      <input class="input-group type="text" id="email" placeholder="E-Mail" required>
      <input class="input-group type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>

    <p>Não tem conta? <a href="#" id="btn-cadastrar">Cadastre-se</a></p>
  </main>

  
</body>
</html>
